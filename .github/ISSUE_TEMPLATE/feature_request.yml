name: Feature request
description: Suggest a new tool, capability, or improvement for the Vitally MCP server.
title: "feat: <short description>"
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose new Vitally tool coverage, new server
        capabilities, or workflow improvements. For bug reports use the
        Bug report template instead.

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? What use case does it unblock?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How should the feature work? Include the Vitally REST endpoint(s) it would wrap, or the new behaviour in concrete terms.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you weigh?

  - type: textarea
    id: context
    attributes:
      label: Additional context (links, screenshots, related issues)
