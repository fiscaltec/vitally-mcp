name: Bug report
description: Something in the Vitally MCP server isn't working as expected.
title: "fix: <short description>"
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much
        as you can - reports with concrete steps and version info close
        much faster.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug, including any error messages or exception output.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Call the `List_account` tool with `limit: 5`
        2. ...
        3. Observe response
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour (include full error / response if possible)
    validations:
      required: true

  - type: dropdown
    id: region
    attributes:
      label: Vitally region
      options:
        - EU (default)
        - US
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: MCP client
      options:
        - Claude Desktop
        - Claude Code
        - VS Code
        - Cursor
        - Other (please describe in 'Additional context')
    validations:
      required: true

  - type: input
    id: server-url
    attributes:
      label: Server URL
      description: The URL your MCP client is pointed at, e.g. https://vitally.fiscaltec.com/mcp or a self-hosted instance URL.
      placeholder: https://vitally.fiscaltec.com/mcp
    validations:
      required: true

  - type: input
    id: time-utc
    attributes:
      label: Time of failure (UTC)
      description: Approximate timestamp — helps correlate with Application Insights / Log Analytics.
      placeholder: e.g. 2026-05-21T14:32Z
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (client-side error pane, JSON-RPC error response, etc.)
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
