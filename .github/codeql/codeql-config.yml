# CodeQL analysis configuration.
#
# Excludes compiler-generated build output (obj/, bin/) from analysis so
# auto-generated sources — e.g. XunitAutoGeneratedEntryPoint.cs under
# obj/Release — are not scanned and reported as alerts. These paths contain
# no hand-written code, so any findings there are pure noise.
#
# The query suite is still set via the `queries:` input in codeql.yml; this
# file only narrows the analysed paths.
name: "CodeQL config"

paths-ignore:
  - "**/obj/**"
  - "**/bin/**"
