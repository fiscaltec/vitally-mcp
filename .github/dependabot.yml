version: 2

updates:
  # Keep NuGet packages current across both projects.
  # We've already been bitten once by sitting on the MCP SDK preview far too
  # long - weekly checks here would have caught the 0.4.0-preview.3 -> 1.0 GA
  # transition immediately.
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      # Use "build" to match the Conventional Commits convention for
      # dependency / build-system changes. Required for our pr-title
      # workflow's type allowlist (build is in, nuget is not).
      prefix: "build"
      include: "scope"
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      # Azure SDK packages share a transitive Azure.Core dependency. Bumping them in
      # separate PRs caused a CS0433 'DefaultAzureCredential' collision (KeyVault.Secrets
      # pulled a newer Azure.Core than the pinned Azure.Identity). Grouping them means the
      # set builds or fails as a unit.
      azure:
        patterns:
          - "Azure.*"
      test-framework:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.*"
          - "FluentAssertions"
          - "Moq*"

  # Keep GitHub Actions versions current (actions/checkout, setup-dotnet, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Track the Dockerfile base images (dotnet/sdk + dotnet/aspnet). The floating "10.0"
  # tags already pick up patch/minor on rebuild; this surfaces major bumps (e.g. .NET 11
  # base images) as a PR so the runtime doesn't silently drift behind a new release.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build"
      include: "scope"
